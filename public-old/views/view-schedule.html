<!-- Schedule view partial -->
<div x-show="currentView === 'schedule'">
  <div class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Lịch phân ca</h1>
      <p class="text-gray-500 text-sm mt-0.5">
        Phân công sử dụng seat theo ngày
        <template x-if="isAdmin()">
          <span class="ml-2 text-teal-600">— Kéo thả để phân ca</span>
        </template>
      </p>
    </div>
    <template x-if="isAdmin()">
      <button @click="clearAllSchedules()"
        class="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 border border-red-200 rounded-lg hover:bg-red-100 transition-colors">
        Xoá toàn bộ
      </button>
    </template>
  </div>

  <div class="flex gap-4">
    <!-- Member sidebar (admin only) -->
    <template x-if="isAdmin()">
      <div class="w-40 shrink-0 space-y-3">
        <div class="text-xs font-semibold text-gray-500 uppercase">Thành viên</div>
        <template x-for="seat in seats" :key="'members_' + seat.id">
          <div class="bg-white rounded-lg border border-gray-200 p-2">
            <div class="text-xs font-medium text-gray-400 mb-1.5 truncate" x-text="seat.label || seat.email"></div>
            <div class="flex flex-col gap-1">
              <template x-for="u in getSeatUsers(seat.id)" :key="'m_' + u.id">
                <div class="flex items-center gap-1.5 bg-teal-50 border border-teal-200 rounded-md px-2 py-1 cursor-grab active:cursor-grabbing select-none"
                  draggable="true"
                  @dragstart="onMemberDragStart($event, seat.id, u.id, u.name)"
                  @dragend="onScheduleDragEnd($event)">
                  <div class="w-4 h-4 rounded-full bg-teal-600 flex items-center justify-center text-white shrink-0" style="font-size:9px"
                    x-text="userInitial(u.name)"></div>
                  <span class="text-xs text-teal-700 truncate" x-text="u.name"></span>
                </div>
              </template>
              <div x-show="getSeatUsers(seat.id).length === 0"
                class="text-xs text-gray-300 italic">Trống</div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Schedule table -->
    <div class="flex-1 bg-white rounded-xl border border-gray-200 overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50">
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 mono uppercase w-44">Seat</th>
            <th class="px-3 py-3 text-center text-xs font-semibold text-gray-500 mono uppercase w-16">Ca</th>
            <template x-for="(day, i) in DAYS" :key="i">
              <th class="px-3 py-3 text-center text-xs font-semibold text-gray-500 mono uppercase"
                x-text="day"></th>
            </template>
          </tr>
        </thead>
        <tbody>
          <template x-for="seat in seats" :key="seat.id">
            <template x-for="slot in ['morning', 'afternoon']" :key="seat.id + '_' + slot">
              <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                <td x-show="slot === 'morning'" rowspan="2" class="px-5 py-3 border-r border-gray-100">
                  <div class="font-medium text-gray-800 mono text-xs truncate" x-text="seat.email"></div>
                  <span :class="seat.team === 'dev' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-green-50 text-green-600 border-green-200'"
                    class="mt-1 inline-block px-1.5 py-0.5 rounded text-xs border uppercase"
                    x-text="seat.team"></span>
                </td>
                <td class="px-3 py-2 text-center text-xs text-gray-400" x-text="slot === 'morning' ? 'Sáng' : 'Chiều'"></td>
                <template x-for="dayIdx in [0,1,2,3,4]" :key="dayIdx">
                  <!-- Drop zone cell -->
                  <td class="px-3 py-2 text-center transition-colors"
                      @dragover="onScheduleDragOver($event, seat.id)"
                      @dragenter="onScheduleDragEnter($event, seat.id)"
                      @dragleave="onScheduleDragLeave($event)"
                      @drop="onScheduleDrop($event, seat.id, dayIdx, slot)">
                    <template x-if="getScheduleEntry(seat.id, dayIdx, slot)">
                      <span class="inline-flex items-center gap-0.5 px-2 py-1 rounded-md text-xs font-medium bg-teal-50 text-teal-700 border border-teal-200 select-none group"
                        :class="isAdmin() ? 'cursor-grab active:cursor-grabbing' : ''"
                        :draggable="isAdmin()"
                        @dragstart="onScheduleDragStart($event, seat.id, dayIdx, slot)"
                        @dragend="onScheduleDragEnd($event)">
                        <span x-text="getScheduleEntry(seat.id, dayIdx, slot)?.user_name"></span>
                        <!-- Close button (admin only) -->
                        <template x-if="isAdmin()">
                          <button @click.stop="clearScheduleEntry(seat.id, dayIdx, slot)"
                            class="w-3.5 h-3.5 rounded-full bg-teal-200/50 hover:bg-red-200 text-teal-500 hover:text-red-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity ml-0.5"
                            title="Xoá">
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                          </button>
                        </template>
                      </span>
                    </template>
                    <template x-if="!getScheduleEntry(seat.id, dayIdx, slot)">
                      <span class="text-gray-300 text-xs">—</span>
                    </template>
                  </td>
                </template>
              </tr>
            </template>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
