<!-- Log Usage view partial -->
<div x-show="currentView === 'log-usage'">
  <div class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Log Usage</h1>
      <p class="text-gray-500 text-sm mt-0.5">Ghi nhận mức sử dụng Claude AI hàng tuần cho từng seat</p>
    </div>
  </div>

  <!-- Week selector -->
  <div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <button @click="changeLogWeek(-1)"
          class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <span class="text-sm font-semibold text-gray-900 min-w-[160px] text-center" x-text="fmtWeekRange(logWeekStart)"></span>
        <button @click="changeLogWeek(1)"
          class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <input type="date" :value="logWeekStart" @change="logWeekStart = snapToMonday($event.target.value); loadLogWeek()"
        class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
      <div x-show="logError" class="flex-1 p-2 bg-red-50 border border-red-200 rounded-lg text-red-600 text-xs" x-text="logError"></div>
      <div x-show="logSuccess" class="flex-1 p-2 bg-green-50 border border-green-200 rounded-lg text-green-600 text-xs" x-text="logSuccess"></div>
    </div>
  </div>

  <!-- Seats usage table -->
  <div class="bg-white rounded-xl border border-gray-200">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 text-xs text-gray-400 mono uppercase">
            <th class="px-5 py-3 text-left font-semibold">Seat</th>
            <th class="px-5 py-3 text-center font-semibold">Team</th>
            <th class="px-5 py-3 text-center font-semibold w-36">All Models %</th>
            <th class="px-5 py-3 text-center font-semibold w-36">Sonnet %</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(seat, idx) in logSeats" :key="seat.seatEmail">
            <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
              <td class="px-5 py-3">
                <div class="text-sm font-medium text-gray-900 mono" x-text="seat.seatEmail"></div>
                <div class="text-xs text-gray-400" x-text="seat.seatLabel"></div>
              </td>
              <td class="px-5 py-3 text-center">
                <span :class="teamBadgeClass(seat.team)"
                  class="px-2 py-0.5 rounded-md text-xs font-medium border"
                  x-text="seat.team"></span>
              </td>
              <td class="px-5 py-3">
                <template x-if="isAdmin()">
                  <input type="number" x-model.number="seat.weeklyAllPct" min="0" max="100"
                    class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-sm text-center focus:outline-none focus:ring-2 focus:ring-teal-500" />
                </template>
                <template x-if="!isAdmin()">
                  <span class="block text-center mono" :class="usagePctClass(seat.weeklyAllPct)" x-text="seat.weeklyAllPct + '%'"></span>
                </template>
              </td>
              <td class="px-5 py-3">
                <template x-if="isAdmin()">
                  <input type="number" x-model.number="seat.weeklySonnetPct" min="0" max="100"
                    class="w-full px-2 py-1.5 border border-gray-300 rounded-lg text-sm text-center focus:outline-none focus:ring-2 focus:ring-teal-500" />
                </template>
                <template x-if="!isAdmin()">
                  <span class="block text-center mono" :class="usagePctClass(seat.weeklySonnetPct)" x-text="seat.weeklySonnetPct + '%'"></span>
                </template>
              </td>
            </tr>
          </template>
          <tr x-show="logSeats.length === 0 && !loading">
            <td colspan="4" class="px-5 py-8 text-center text-gray-400 text-sm">Chưa có seat nào</td>
          </tr>
        </tbody>
      </table>
    </div>
    <template x-if="isAdmin()">
      <div class="px-5 py-4 border-t border-gray-100 flex justify-end">
        <button @click="submitLog()" :disabled="logSubmitting || logSeats.length === 0"
          class="bg-teal-700 hover:bg-teal-800 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm disabled:opacity-50">
          <span x-text="logSubmitting ? 'Đang lưu...' : 'Lưu tất cả'"></span>
        </button>
      </div>
    </template>
  </div>
</div>
