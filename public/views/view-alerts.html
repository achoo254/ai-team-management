<!-- Alerts view partial -->
<div x-show="currentView === 'alerts'">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">Cảnh báo</h1>
    <p class="text-gray-500 text-sm mt-0.5">Theo dõi các cảnh báo sử dụng</p>
  </div>

  <!-- Unresolved alerts -->
  <div class="space-y-3 mb-8">
    <template x-for="alert in alerts" :key="alert.id">
      <div :class="alertBorderClass(alert.type)"
        class="bg-white rounded-xl border-l-4 border border-gray-200 p-5 flex items-start gap-4">
        <div :class="alertIconBgClass(alert.type)" class="shrink-0 w-9 h-9 rounded-full flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-semibold px-2 py-0.5 rounded uppercase mono bg-gray-100 text-gray-600"
              x-text="alert.type.replace('_', ' ')"></span>
            <span class="text-xs mono text-gray-400" x-text="alert.seat_email"></span>
          </div>
          <p class="text-sm text-gray-800 font-medium" x-text="alert.message"></p>
          <p class="text-xs text-gray-400 mt-1" x-text="timeAgo(alert.created_at)"></p>
        </div>
        <button x-show="isAdmin()" @click="resolveAlert(alert.id)"
          class="shrink-0 bg-teal-700 hover:bg-teal-800 text-white text-xs px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
          Đã xử lý
        </button>
      </div>
    </template>
    <div x-show="alerts.length === 0 && !loading"
      class="bg-white rounded-xl border border-gray-200 p-8 text-center text-gray-400 text-sm">
      Không có cảnh báo nào
    </div>
  </div>

  <!-- Resolved alerts -->
  <div x-show="resolvedAlerts.length > 0">
    <h2 class="text-sm font-semibold text-gray-400 uppercase mono mb-3">
      Đã xử lý (<span x-text="resolvedAlerts.length"></span>)
    </h2>
    <div class="space-y-2 opacity-50">
      <template x-for="alert in resolvedAlerts" :key="alert.id">
        <div class="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3">
          <svg class="w-4 h-4 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-sm text-gray-600" x-text="alert.message"></span>
          <span class="ml-auto text-xs mono text-gray-400" x-text="timeAgo(alert.created_at)"></span>
        </div>
      </template>
    </div>
  </div>
</div>
