<!-- User create/edit modal partial -->
<div x-show="editUserModal !== null"
  class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6" @click.stop>
    <h3 class="font-bold text-gray-900 text-base mb-5"
      x-text="editUserModal?.id ? 'Sửa người dùng' : 'Thêm người dùng'"></h3>

    <div class="space-y-3" x-show="editUserModal">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Tên</label>
        <input type="text" x-model="editUserModal.name" placeholder="Nguyễn Văn A"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Email</label>
        <input type="email" x-model="editUserModal.email" placeholder="email@company.com"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">
          Mật khẩu
          <span x-show="editUserModal?.id" class="text-gray-400">(để trống nếu không đổi)</span>
        </label>
        <input type="password" x-model="editUserModal.password" placeholder="••••••••"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Team</label>
          <select x-model="editUserModal.team"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            <option value="DEV">DEV</option>
            <option value="MKT">MKT</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Vai trò</label>
          <select x-model="editUserModal.role"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Seat</label>
        <select x-model="editUserModal.seatId"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
          <option value="">— Không có —</option>
          <template x-for="s in seats" :key="s.id">
            <option :value="s.id" x-text="s.email"></option>
          </template>
        </select>
      </div>
    </div>

    <div class="flex justify-end gap-2 mt-6">
      <button @click="editUserModal = null"
        class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-300 rounded-lg">
        Huỷ
      </button>
      <button @click="saveUser()"
        class="px-4 py-2 text-sm bg-teal-700 hover:bg-teal-800 text-white rounded-lg transition-colors">
        Lưu
      </button>
    </div>
  </div>
</div>
