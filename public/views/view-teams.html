<!-- Teams view partial (admin only) -->
<div x-show="currentView === 'teams' && isAdmin()">
  <div class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Teams</h1>
      <p class="text-gray-500 text-sm mt-0.5">Quản lý nhóm làm việc</p>
    </div>
    <button @click="openNewTeamModal()"
      class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white text-sm px-4 py-2 rounded-lg transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Thêm Team
    </button>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <template x-for="t in teamsList" :key="t.id">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold"
              :style="'background-color:' + (t.color || '#3b82f6')"
              x-text="t.label.charAt(0).toUpperCase()"></div>
            <div>
              <div class="font-semibold text-gray-900 text-sm" x-text="t.label"></div>
              <div class="text-gray-400 text-xs mono" x-text="t.name"></div>
            </div>
          </div>
          <div class="flex gap-0.5">
            <button @click="openEditTeamModal(t)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-teal-600 hover:bg-teal-50 transition-colors" title="Sửa">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button @click="deleteTeam(t.id)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Xoá">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-4">
          <div class="bg-gray-50 rounded-lg px-3 py-2">
            <div class="text-lg font-bold text-gray-900 mono" x-text="t.user_count || 0"></div>
            <div class="text-xs text-gray-400">Thành viên</div>
          </div>
          <div class="bg-gray-50 rounded-lg px-3 py-2">
            <div class="text-lg font-bold text-gray-900 mono" x-text="t.seat_count || 0"></div>
            <div class="text-xs text-gray-400">Seats</div>
          </div>
        </div>
      </div>
    </template>

    <div x-show="teamsList.length === 0 && !loading"
      class="col-span-3 text-center py-12 text-gray-400 text-sm">
      Chưa có team nào
    </div>
  </div>

  <!-- Team create/edit modal -->
  <template x-if="editTeamModal">
    <div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="editTeamModal = null">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6" @click.stop>
        <h3 class="font-bold text-gray-900 text-base mb-5"
          x-text="editTeamModal.id ? 'Sửa Team' : 'Thêm Team mới'"></h3>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Tên (viết liền, không dấu)</label>
            <input type="text" x-model="editTeamModal.name" placeholder="design"
              :disabled="!!editTeamModal.id"
              :class="editTeamModal.id ? 'bg-gray-50 text-gray-500' : ''"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Tên hiển thị</label>
            <input type="text" x-model="editTeamModal.label" placeholder="Design"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Màu</label>
            <div class="flex items-center gap-2">
              <input type="color" x-model="editTeamModal.color"
                class="w-8 h-8 rounded border border-gray-300 cursor-pointer" />
              <input type="text" x-model="editTeamModal.color" placeholder="#3b82f6"
                class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm mono focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
          <button @click="editTeamModal = null"
            class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-300 rounded-lg">
            Huỷ
          </button>
          <button @click="saveTeam()"
            class="px-4 py-2 text-sm bg-teal-700 hover:bg-teal-800 text-white rounded-lg transition-colors">
            Lưu
          </button>
        </div>
      </div>
    </div>
  </template>
</div>
