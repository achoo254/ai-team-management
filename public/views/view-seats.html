<!-- Seats view partial -->
<div x-show="currentView === 'seats'">
  <div class="mb-6 flex items-start justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Seats</h1>
      <p class="text-gray-500 text-sm mt-0.5">Danh sách tài khoản Claude AI</p>
    </div>
    <template x-if="isAdmin()">
      <button @click="openNewSeatModal()"
        class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white text-sm px-4 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Thêm Seat
      </button>
    </template>
  </div>

  <div class="grid grid-cols-3 gap-4">
    <template x-for="seat in seats" :key="seat.id">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <div class="flex items-start justify-between mb-3">
          <div class="min-w-0">
            <div class="font-medium text-gray-900 text-sm truncate mono" x-text="seat.email"></div>
            <div class="text-gray-400 text-xs mt-0.5" x-text="seat.label || ''"></div>
          </div>
          <div class="flex items-center gap-1 ml-2 shrink-0">
            <span :class="teamBadgeClass(seat.team)"
              class="px-2 py-0.5 rounded-md text-xs font-medium border"
              x-text="seat.team"></span>
            <!-- Edit/Delete buttons (admin) -->
            <template x-if="isAdmin()">
              <div class="flex gap-0.5 ml-1">
                <button @click="openEditSeatModal(seat)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-teal-600 hover:bg-teal-50 transition-colors" title="Sửa">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                </button>
                <button @click="deleteSeat(seat.id)" class="w-6 h-6 rounded flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Xoá">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </button>
              </div>
            </template>
          </div>
        </div>

        <div class="text-xs text-gray-400 mb-2 font-medium mono">
          <span x-text="(seat.users || []).length"></span>/<span x-text="seat.max_users"></span> người dùng
        </div>

        <div class="flex flex-wrap gap-1.5">
          <template x-for="u in (seat.users || [])" :key="u.id">
            <div class="flex items-center gap-1.5 bg-gray-50 border border-gray-200 rounded-lg px-2 py-1 group">
              <div class="w-5 h-5 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold shrink-0"
                x-text="userInitial(u.name)"></div>
              <span class="text-xs text-gray-700" x-text="u.name"></span>
              <template x-if="isAdmin()">
                <button @click="unassignUser(seat.id, u.id)"
                  class="w-4 h-4 rounded-full bg-red-100 text-red-500 hover:bg-red-200 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity ml-0.5"
                  title="Xoá khỏi seat">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </template>
            </div>
          </template>

          <template x-if="isAdmin()">
            <button @click="openAssignModal(seat.id, seat.label || seat.email)"
              class="flex items-center gap-1 bg-white border border-dashed border-gray-300 hover:border-teal-400 hover:bg-teal-50 rounded-lg px-2 py-1 text-xs text-gray-400 hover:text-teal-600 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/>
              </svg>
              Thêm
            </button>
          </template>

          <div x-show="(seat.users || []).length === 0"
            class="text-xs text-gray-400 italic">Chưa có người dùng</div>
        </div>
      </div>
    </template>

    <div x-show="seats.length === 0 && !loading"
      class="col-span-3 text-center py-12 text-gray-400 text-sm">
      Chưa có seats nào
    </div>
  </div>

  <!-- Assign user modal -->
  <template x-if="seatAssignModal">
    <div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="seatAssignModal = null">
      <div class="bg-white rounded-xl shadow-xl w-80 max-h-96 flex flex-col">
        <div class="p-4 border-b border-gray-100">
          <h3 class="font-semibold text-gray-900 text-sm">Thêm người vào seat</h3>
          <p class="text-xs text-gray-400 mt-0.5" x-text="seatAssignModal.seatLabel"></p>
        </div>
        <div class="overflow-y-auto p-2 flex-1">
          <template x-for="u in availableUsersForSeat(seatAssignModal.seatId)" :key="u.id">
            <button @click="assignUserToSeat(u.id)"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-teal-50 text-left transition-colors">
              <div class="w-6 h-6 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold shrink-0"
                x-text="userInitial(u.name)"></div>
              <div>
                <div class="text-sm text-gray-800" x-text="u.name"></div>
                <div class="text-xs text-gray-400" x-text="u.email"></div>
              </div>
            </button>
          </template>
          <div x-show="availableUsersForSeat(seatAssignModal.seatId).length === 0"
            class="text-center py-4 text-xs text-gray-400">Không có người khả dụng</div>
        </div>
        <div class="p-3 border-t border-gray-100">
          <button @click="seatAssignModal = null"
            class="w-full px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700 rounded-lg hover:bg-gray-100 transition-colors">
            Đóng
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- Seat create/edit modal -->
  <template x-if="editSeatModal">
    <div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="editSeatModal = null">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6" @click.stop>
        <h3 class="font-bold text-gray-900 text-base mb-5"
          x-text="editSeatModal.id ? 'Sửa Seat' : 'Thêm Seat mới'"></h3>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Email tài khoản</label>
            <input type="email" x-model="editSeatModal.email" placeholder="account@example.com"
              :disabled="!!editSeatModal.id"
              :class="editSeatModal.id ? 'bg-gray-50 text-gray-500' : ''"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Tên hiển thị</label>
            <input type="text" x-model="editSeatModal.label" placeholder="TK Tên"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Team</label>
              <select x-model="editSeatModal.team"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <template x-for="t in teamsList" :key="t.name">
                  <option :value="t.name" x-text="t.label"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Số người tối đa</label>
              <input type="number" x-model.number="editSeatModal.max_users" min="1" max="10"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
          <button @click="editSeatModal = null"
            class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-300 rounded-lg">
            Huỷ
          </button>
          <button @click="saveSeat()"
            class="px-4 py-2 text-sm bg-teal-700 hover:bg-teal-800 text-white rounded-lg transition-colors">
            Lưu
          </button>
        </div>
      </div>
    </div>
  </template>
</div>
