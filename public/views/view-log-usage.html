<!-- Log Usage view partial -->
<div x-show="currentView === 'log-usage'">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">Log Usage</h1>
    <p class="text-gray-500 text-sm mt-0.5">Ghi nhận phiên sử dụng Claude AI</p>
  </div>

  <div class="grid grid-cols-3 gap-6">
    <!-- Log form -->
    <div class="col-span-1">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h2 class="font-semibold text-gray-900 text-sm mb-4">Ghi nhận phiên mới</h2>
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Ngày</label>
            <input type="date" x-model="logForm.date"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Số sessions</label>
            <input type="number" x-model.number="logForm.sessions" min="1" max="50" placeholder="1"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">% Token trước</label>
              <input type="number" x-model.number="logForm.tokensBefore" min="0" max="100" placeholder="0"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">% Token sau</label>
              <input type="number" x-model.number="logForm.tokensAfter" min="0" max="100" placeholder="0"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Mục đích</label>
            <select x-model="logForm.purpose"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
              <option value="">— Chọn —</option>
              <option value="code">Code / Debug</option>
              <option value="review">Code Review</option>
              <option value="design">Design</option>
              <option value="content">Content / SEO</option>
              <option value="planning">Planning</option>
              <option value="research">Research</option>
              <option value="other">Khác</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Dự án</label>
            <input type="text" x-model="logForm.project" placeholder="Tên dự án"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
          <div x-show="logError" class="p-2 bg-red-50 border border-red-200 rounded-lg text-red-600 text-xs" x-text="logError"></div>
          <div x-show="logSuccess" class="p-2 bg-green-50 border border-green-200 rounded-lg text-green-600 text-xs" x-text="logSuccess"></div>
          <button @click="submitLog()" :disabled="logSubmitting"
            class="w-full bg-teal-700 hover:bg-teal-800 text-white font-medium py-2.5 rounded-lg transition-colors text-sm disabled:opacity-50">
            <span x-text="logSubmitting ? 'Đang lưu...' : 'Ghi nhận'"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- My log history -->
    <div class="col-span-2">
      <div class="bg-white rounded-xl border border-gray-200">
        <div class="px-5 py-4 border-b border-gray-100">
          <h2 class="font-semibold text-gray-900 text-sm">Lịch sử log của tôi</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-gray-100 text-xs text-gray-400 mono uppercase">
                <th class="px-5 py-3 text-left font-semibold">Ngày</th>
                <th class="px-5 py-3 text-right font-semibold">Sessions</th>
                <th class="px-5 py-3 text-center font-semibold">% Trước</th>
                <th class="px-5 py-3 text-center font-semibold">% Sau</th>
                <th class="px-5 py-3 text-center font-semibold">Delta</th>
                <th class="px-5 py-3 text-left font-semibold">Mục đích</th>
                <th class="px-5 py-3 text-left font-semibold">Dự án</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="log in myLogs" :key="log.id">
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                  <td class="px-5 py-3 mono text-xs text-gray-700" x-text="log.date"></td>
                  <td class="px-5 py-3 text-right mono font-semibold text-gray-900" x-text="log.sessions"></td>
                  <td class="px-5 py-3 text-center mono text-xs text-gray-500" x-text="log.tokens_before + '%'"></td>
                  <td class="px-5 py-3 text-center mono text-xs text-gray-500" x-text="log.tokens_after + '%'"></td>
                  <td class="px-5 py-3 text-center mono text-xs font-medium"
                    :class="(log.tokens_after - log.tokens_before) > 15 ? 'text-red-500' : 'text-gray-600'"
                    x-text="'+' + (log.tokens_after - log.tokens_before) + '%'"></td>
                  <td class="px-5 py-3 text-xs text-gray-600" x-text="log.purpose || '—'"></td>
                  <td class="px-5 py-3 text-xs text-gray-600" x-text="log.project || '—'"></td>
                </tr>
              </template>
              <tr x-show="myLogs.length === 0 && !loading">
                <td colspan="7" class="px-5 py-8 text-center text-gray-400 text-sm">Chưa có log nào. Hãy ghi nhận phiên sử dụng đầu tiên!</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
