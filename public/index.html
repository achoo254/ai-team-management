<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine loaded WITHOUT defer — we call Alpine.start() manually after partials inject -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: ui-monospace, 'Cascadia Code', monospace; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50" x-data="dashboardApp()" x-init="init()" x-cloak>

<!-- ========== SIDEBAR ========== -->
<aside class="fixed top-0 left-0 h-screen w-64 bg-[#1A1A2E] flex flex-col z-30">
  <div class="flex items-center gap-3 px-6 py-5 border-b border-white/10">
    <div class="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center shrink-0">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
      </svg>
    </div>
    <span class="text-white font-semibold text-sm">AI Manager</span>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <template x-for="item in NAV_ITEMS" :key="item.key">
      <button x-show="!item.adminOnly || isAdmin()" @click="navigate(item.key)"
        :class="currentView === item.key ? 'bg-teal-700/30 text-teal-400 border-teal-700/40' : 'text-gray-400 hover:bg-white/5 hover:text-white border-transparent'"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all border">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" :d="item.icon"/>
        </svg>
        <span x-text="item.label"></span>
        <span x-show="item.key === 'alerts' && alerts.length > 0"
          class="ml-auto bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center mono"
          x-text="alerts.length"></span>
      </button>
    </template>
  </nav>
  <div class="px-4 py-4 border-t border-white/10">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white text-xs font-bold shrink-0"
        x-text="user ? userInitial(user.name) : '?'"></div>
      <div class="min-w-0">
        <div class="text-white text-xs font-medium truncate" x-text="user?.name || '...'"></div>
        <div class="text-gray-500 text-xs truncate" x-text="user?.team || ''"></div>
      </div>
    </div>
    <button @click="logout()" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Đăng xuất</button>
  </div>
</aside>

<!-- ========== MAIN CONTENT ========== -->
<main class="ml-64 min-h-screen p-8">
  <div x-show="error" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm flex items-center justify-between">
    <span x-text="error"></span>
    <button @click="error = null" class="text-red-400 hover:text-red-600 ml-4 font-bold">✕</button>
  </div>
  <div x-show="loading" class="flex items-center gap-3 text-gray-400 text-sm mb-6">
    <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
    Đang tải...
  </div>

  <!-- View containers — partials injected here before Alpine starts -->
  <div id="view-dashboard"></div>
  <div id="view-log-usage"></div>
  <div id="view-seats"></div>
  <div id="view-schedule"></div>
  <div id="view-teams"></div>
  <div id="view-alerts"></div>
  <div id="view-admin"></div>
</main>

<!-- User modal -->
<div id="view-modal"></div>

<script src="/js/api-client.js"></script>
<script src="/js/dashboard-helpers.js"></script>
<script src="/js/dashboard-admin-actions.js"></script>
<script src="/js/dashboard-app.js"></script>
<script>
  /**
   * Inject all HTML view partials into their placeholder divs,
   * then start Alpine manually so it processes the fully-populated DOM.
   */
  (async () => {
    const views = ['dashboard', 'log-usage', 'seats', 'schedule', 'teams', 'alerts', 'admin', 'modal'];
    await Promise.all(views.map(async (v) => {
      try {
        const res = await fetch('/views/view-' + v + '.html');
        const html = await res.text();
        document.getElementById('view-' + v).innerHTML = html;
      } catch (e) {
        console.warn('Failed to load view partial:', v, e);
      }
    }));

    // Load Alpine after DOM is fully populated
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js';
    document.head.appendChild(script);
  })();
</script>
</body>
</html>
