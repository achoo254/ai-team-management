<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#e8590c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="url(#bg)"/>

  <!-- Simplified bars -->
  <rect x="7" y="18" width="4" height="8" rx="1" fill="url(#bar1)" opacity="0.9"/>
  <rect x="13" y="14" width="4" height="12" rx="1" fill="url(#bar2)" opacity="0.9"/>
  <rect x="19" y="16" width="4" height="10" rx="1" fill="url(#bar1)" opacity="0.9"/>
  <rect x="25" y="11" width="4" height="15" rx="1" fill="url(#bar2)" opacity="0.85"/>

  <!-- Trend line -->
  <polyline points="9,16 15,12 21,14 27,9"
    stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    fill="none" opacity="0.8"/>
</svg>
